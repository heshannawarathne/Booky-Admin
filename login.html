<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BookyAdmin | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f3b3c 0%, #1e6f5c 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #eef4ff;
            overflow: hidden;
        }

        /* Glassmorphism Effect for Login Box */
        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo-area h3 {
            font-weight: 700;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF 0%, #C0F2E6 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0;
        }

        .logo-area p {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 8px;
            letter-spacing: 0.3px;
        }

        .form-label-custom {
            font-weight: 500;
            font-size: 0.9rem;
            color: #d1e3e8;
            margin-bottom: 8px;
        }

        .input-group-modern {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group-modern i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
            z-index: 10;
        }

        .form-modern {
            width: 100%;
            padding: 14px 18px 14px 50px; /* Space for icon */
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-modern:focus {
            border-color: #289672;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(40, 150, 114, 0.2);
            outline: none;
        }

        /* Customize input placeholder color */
        .form-modern::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn-teal-custom {
            background: #1e6f5c;
            border: none;
            padding: 14px;
            width: 100%;
            font-weight: 600;
            border-radius: 16px;
            color: white;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-teal-custom:hover {
            background: #289672;
            transform: scale(0.98);
            color: white;
        }

        .footer-text {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            opacity: 0.5;
        }

        /* Floating decoration circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(40, 150, 114, 0.2) 0%, rgba(30, 111, 92, 0) 100%);
            z-index: -1;
        }

        .circle-1 { width: 300px; height: 300px; top: -100px; right: -50px; }
        .circle-2 { width: 200px; height: 200px; bottom: -50px; left: -80px; }

    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="login-card shadow-lg">
        <div class="logo-area">
            <h3>Booky Admin</h3>
            <p>Secure Enterprise Portal</p>
        </div>

        <form onsubmit="loginAdmin(event)">
            <div class="mb-4">
                <label class="form-label form-label-custom">Admin Email</label>
                <div class="input-group-modern">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" class="form-modern" placeholder="Enter your email" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label form-label-custom">Password</label>
                <div class="input-group-modern">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" class="form-modern" placeholder="Enter your password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-teal-custom py-3 mt-3">
                <i class="fas fa-sign-in-alt me-1"></i> Sign In to Dashboard
            </button>
        
        </form>

        <div class="footer-text">
            © 2026 Booky Highway (Pvt) Ltd. All rights reserved.
        </div>
    </div>
